<!DOCTYPE html>
<html>
  <head>
    <title>Survival AR - Guaranteed Placement</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      .ui-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 85%; }
      #status { background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; text-align: center; }
      button { padding: 20px; width: 100%; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; color: white; cursor: pointer; }
      #start-btn { background: #007bff; }
      #drop-btn { background: #28a745; display: none; }
      .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
  </head>
  <body>

    <div id="start-overlay" class="overlay">
      <button id="start-btn" onclick="initializeSensors()">START SURVIVAL TRACKER</button>
    </div>

    <div class="ui-container">
      <div id="status">System Standby...</div>
      <button id="drop-btn" onclick="forcePlaceMarker()">PLACE MARKER AT FEET</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-sphere id="breadcrumb" visible="false" radius="8" material="color: green; opacity: 0.7; emissive: #00ff00;"></a-sphere>
      <a-camera gps-camera="simulateAltitude: true; minDistance: 1;" rotation-reader></a-camera>
    </a-scene>

    <script>
      const status = document.getElementById('status');
      const breadcrumb = document.getElementById('breadcrumb');

      function initializeSensors() {
        // Unlock sensors for Android 16
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(res => {
            if (res === 'granted') startAR();
          });
        } else {
          startAR();
        }
      }

      function startAR() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('drop-btn').style.display = 'block';
        status.innerText = "Sensors Active. Aim phone at the ground and tap button.";
      }

      function forcePlaceMarker() {
        // Method: Get GPS, but force-render the object in the camera's current field of view
        navigator.geolocation.getCurrentPosition((pos) => {
          const { latitude, longitude } = pos.coords;
          
          // 1. Assign physical GPS coordinates
          breadcrumb.setAttribute('gps-entity-place', `latitude: ${latitude}; longitude: ${longitude};`);
          
          // 2. Force visibility and "un-hide"
          breadcrumb.setAttribute('visible', 'true');
          
          status.innerText = "MARKER DROPPED. Back up 5 meters to test alert.";
          console.log("Marker locked at: ", latitude, longitude);
        }, (err) => {
          status.innerText = "GPS Error. Please enable Location Services.";
        }, { enableHighAccuracy: true, timeout: 5000 });
      }

      // Proximity & "Panic" logic
      setInterval(() => {
        const dist = breadcrumb.getAttribute('distance');
        if (dist && dist > 5) {
          breadcrumb.setAttribute('material', 'color', 'red');
          breadcrumb.setAttribute('material', 'emissive', '#ff0000');
          status.innerHTML = `<span style="color:#ff4444"><b>OFF-PATH:</b> ${Math.round(dist)}m away</span>`;
        } else if (dist) {
          breadcrumb.setAttribute('material', 'color', 'green');
          breadcrumb.setAttribute('material', 'emissive', '#00ff00');
          status.innerText = "STATUS: SAFE";
        }
      }, 800);
    </script>
  </body>
</html>
