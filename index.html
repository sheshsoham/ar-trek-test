<!DOCTYPE html>
<html>
  <head>
    <title>Survival AR Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .ui-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center; }
      button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
      #status { color: white; background: rgba(0,0,0,0.5); padding: 5px; margin-bottom: 10px; border-radius: 5px; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <div class="ui-panel">
      <div id="status">Status: No Marker Set</div>
      <button onclick="setMarker()">DROP BREADCRUMB</button>
    </div>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-sphere id="marker" color="green" scale="2 2 2" visible="false"></a-sphere>
      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
    <script>
      function setMarker() {
        // Get current position from GPS camera
        const camera = document.querySelector('[gps-camera]');
        const pos = camera.components['gps-camera'].currentCoords;
        const marker = document.querySelector('#marker');
        
        marker.setAttribute('gps-entity-place', `latitude: ${pos.latitude}; longitude: ${pos.longitude};`);
        marker.setAttribute('visible', 'true');
        document.getElementById('status').innerText = "Marker Dropped! Walk 5m away.";
      }

      window.addEventListener('gps-camera-update-position', e => {
        const marker = document.querySelector('#marker');
        const dist = marker.getAttribute('distance');
        if (dist && dist > 5) {
          marker.setAttribute('color', 'red');
          document.getElementById('status').innerText = `OFF PATH! Dist: ${Math.round(dist)}m`;
        } else if (dist) {
          marker.setAttribute('color', 'green');
          document.getElementById('status').innerText = "SAFE";
        }
      });
    </script>
  </body>
</html>
