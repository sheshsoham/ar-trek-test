<!DOCTYPE html>
<html>
  <head>
    <title>Survival Trek AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; text-align: center; font-family: sans-serif; }
      button { padding: 20px; width: 100%; font-size: 1.2rem; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; }
      #status { background: rgba(0,0,0,0.7); color: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 0.9rem; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <div class="ui">
      <div id="status">Wait for "GPS Ready"...</div>
      <button onclick="dropMarker()">DROP BREADCRUMB</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;"
      vr-mode-ui="enabled: false">
      
      <a-sphere 
        id="marker" 
        visible="false" 
        radius="10" 
        material="color: green; opacity: 0.8; transparent: true;"
        gps-entity-place="latitude: 0; longitude: 0;">
      </a-sphere>

      <a-camera gps-camera="simulateAltitude: true; minDistance: 1;" rotation-reader></a-camera>
    </a-scene>

    <script>
      const status = document.getElementById('status');
      const marker = document.getElementById('marker');

      // 1. Initial GPS Check
      window.addEventListener('gps-camera-update-position', (e) => {
        status.innerText = "GPS Ready. Tap to Drop Marker.";
      });

      function dropMarker() {
        navigator.geolocation.getCurrentPosition((pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;

          // Update the marker coordinates
          marker.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
          marker.setAttribute('visible', 'true');
          
          status.innerText = "Marker Dropped! Walk 5-10m away.";
          console.log(`Marker placed at: ${lat}, ${lon}`);
        }, (err) => {
          status.innerText = "Error: Enable GPS/High Accuracy";
        }, { enableHighAccuracy: true });
      }

      // 2. Proximity Alert Logic
      setInterval(() => {
        const dist = marker.getAttribute('distance');
        if (dist && dist > 5) {
          marker.setAttribute('material', 'color', 'red');
          status.innerHTML = `<b style="color:red">OFF PATH!</b> Dist: ${Math.round(dist)}m`;
        } else if (dist) {
          marker.setAttribute('material', 'color', 'green');
          status.innerText = "SAFE";
        }
      }, 1000);
    </script>
  </body>
</html>
