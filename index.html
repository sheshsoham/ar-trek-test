<a-scene 
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">

    <a-sphere 
        id="marker" 
        color="green" 
        scale="3 3 3" 
        visible="false"
        look-at="[gps-camera]">
    </a-sphere>

    <a-camera 
        gps-camera="simulateAltitude: true; minDistance: 1; maxDistance: 100;" 
        rotation-reader>
    </a-camera>
</a-scene>

<script>
    function setMarker() {
        const camera = document.querySelector('[gps-camera]');
        // Get high-accuracy coordinates
        navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            const marker = document.querySelector('#marker');
            marker.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
            marker.setAttribute('visible', 'true');
            
            // This force-refresh helps the browser 'see' the new object
            marker.components['gps-entity-place'].update();
            
            document.getElementById('status').innerText = "Marker Set! Look around you.";
        }, (err) => {
            alert("GPS Error: Please enable High Accuracy location.");
        }, { enableHighAccuracy: true });
    }
</script>
